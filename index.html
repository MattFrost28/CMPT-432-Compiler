<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>TypeScript Compiler</title>
        <link rel="stylesheet" href="compiler.css"> 
    </head>
    <body>
        <div class="container">
            <h2>Source Code Input</h2>
            <textarea id="sourceCode">{ \n $\n}</textarea>
            <br><br>
            <button onclick="startCompile()">Compile</button>

            <h2>Compiled Output</h2>
            <textarea id="outputLog" readonly></textarea>
        </div>

        <script type="module" src="distrib/compiler.js"></script>
    </body>
</html>
